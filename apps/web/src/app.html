<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Default OG / Twitter meta (overridden per-page via svelte:head) -->
    <meta name="description" content="Discover, audition, and curate TTS voices across cloud providers and open models. 180 voices from AWS Polly, Azure, Google, Gemini, OpenAI, ElevenLabs, and local MLX models." />
    <meta name="theme-color" content="#0e5f79" />

    <!-- Open Graph (defaults — overridden per-page via svelte:head) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Vokda" />
    <meta property="og:title" content="Vokda — Discover the perfect voice" />
    <meta property="og:description" content="Browse 180 TTS voices across 19 providers. Audition samples, compare model cards, and build voice collections." />
    <meta property="og:image" content="https://vokda.iksnae.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Vokda — voice discovery and curation platform" />
    <meta property="og:url" content="https://vokda.iksnae.com" />

    <!-- Twitter Card (defaults — overridden per-page via svelte:head) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Vokda — Discover the perfect voice" />
    <meta name="twitter:description" content="Browse 180 TTS voices across 19 providers. Audition samples, compare model cards, and build voice collections." />
    <meta name="twitter:image" content="https://vokda.iksnae.com/og-image.png" />
    <meta name="twitter:image:alt" content="Vokda — voice discovery and curation platform" />

    <!-- Machine/Agent discovery -->
    <link rel="api" type="application/json" href="/api/v1/voices.json" title="Vokda Voice Catalog API" />
    <link rel="alternate" type="application/json" href="/api/v1/openapi.json" title="OpenAPI Spec" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
