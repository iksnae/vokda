name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".agencyx/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".agencyx/**"

# Keep only the newest run per ref; cancel superseded ones so a burst of
# pushes to a branch doesn't burn a full CI run each (private-repo minutes).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type and Svelte checks
        run: npm run check:web

      - name: Catalog freshness (static/api in sync with voices.json)
        run: npm run check:catalog

      - name: Build web app
        run: npm run build:web
