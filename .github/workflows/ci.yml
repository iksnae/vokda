name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  web-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Type and Svelte checks
        run: npm run check:web

      - name: Build web app
        run: npm run build:web
