# SAM configuration for Vokda Synthesis API
# Deploy: cd infra && ./build.sh && sam build && sam deploy
#
# IMPORTANT: production lives in the `personal` AWS account (997901679385),
# which serves api.vokda.iksnae.com and owns the amplify-vokda-k-sandbox
# resources referenced below. The `profile` is pinned so a deploy can never
# silently target the active/default profile and create a dead duplicate
# stack in the wrong account.

version = 0.1

[default.deploy.parameters]
stack_name = "vokda-synthesis-dev"
region = "us-east-1"
profile = "personal"
confirm_changeset = true
capabilities = "CAPABILITY_IAM"
resolve_s3 = true

parameter_overrides = [
  "Stage=dev",
  "CognitoUserPoolId=us-east-1_O3MJpNRMk",
  "CognitoClientId=3n25mheafl42ttssn8pde92lh8",
  "S3BucketName=amplify-vokda-k-sandbox-b-vokdaaudiobucketc3e7c340-mmsdwvur4tui",
  "SynthesisJobTableName=SynthesisJob-qye3mrxz5rcfjpgw4uebq6emfi-NONE",
  "UserCredentialTableName=UserProviderCredential-qye3mrxz5rcfjpgw4uebq6emfi-NONE",
  "MaxQuotaBytes=5368709120"
]
